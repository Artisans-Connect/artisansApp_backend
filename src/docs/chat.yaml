openapi: 3.0.0
info:
  title: CraftMatch Chat API
  version: 1.0.0
paths:
  /api/chat:
    get:
      summary: List all chat conversations for the current user
      tags:
        - Chat
      security:
        - BearerAuth: []
      responses:
        200:
          description: List of conversations
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: array
                    items:
                      type: object
  /api/chat/{id}/messages:
    get:
      summary: Get chat message history for a conversation/job
      tags:
        - Chat
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
          description: The Conversation or Job ID
          example: 45
      responses:
        200:
          description: Message history list
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: array
                    items:
                      type: object
    post:
      summary: Send a message in a conversation/job
      tags:
        - Chat
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
          description: The Conversation or Job ID
          example: 45
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - text
              properties:
                text:
                  type: string
                  example: "Hi, I am on my way to your location."
      responses:
        201:
          description: Message sent successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: object
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
