openapi: 3.0.0
info:
  title: Artisans Reviews API
  version: 1.0.0
paths:
  /api/reviews:
    post:
      summary: Create a review for a completed job
      tags:
        - Reviews
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - job_id
                - rating
              properties:
                job_id:
                  type: integer
                  example: 45
                rating:
                  type: integer
                  minimum: 1
                  maximum: 5
                  example: 5
                comment:
                  type: string
                  example: "Great work! Very prompt and professional."
      responses:
        201:
          description: Review created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: object
  /api/reviews/worker/{workerId}:
    get:
      summary: Get reviews and rating summary for a worker
      tags:
        - Reviews
      parameters:
        - in: path
          name: workerId
          required: true
          schema:
            type: string
          description: The UUID of the worker
          example: "worker_uuid_123"
      responses:
        200:
          description: Worker reviews list
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: array
                    items:
                      type: object
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
